# HTTP-only initial config. Run `certbot --nginx -d automation.heyroya.se`
# to convert this server block to HTTPS — certbot will add a 443 ssl listener,
# fill in ssl_certificate paths, and add an HTTP→HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name automation.heyroya.se;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /dashboard {
        proxy_pass         http://127.0.0.1:8000/dashboard;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /docs {
        return 403;
    }

    location = / {
        return 301 /dashboard;
    }

    location / {
        return 404;
    }
}
