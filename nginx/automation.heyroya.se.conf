server {
    listen 80;
    server_name automation.heyroya.se;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name automation.heyroya.se;

    # certbot will fill these in via `certbot --nginx -d automation.heyroya.se`
    # ssl_certificate     /etc/letsencrypt/live/automation.heyroya.se/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/automation.heyroya.se/privkey.pem;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /dashboard {
        proxy_pass         http://127.0.0.1:8000/dashboard;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /docs {
        return 403;
    }

    location / {
        return 404;
    }
}
